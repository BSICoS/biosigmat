name: MATLAB Tests & Header Validation

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  checks: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Read pinned Biosiglib commit
      id: biosiglib-pin
      shell: bash
      run: |
        commit="$(python - <<'PY'
        import json
        from pathlib import Path

        manifest = json.loads(Path('conformance.json').read_text(encoding='utf-8'))
        commit = manifest['biosiglib']['commit']
        if len(commit) != 40 or any(c not in '0123456789abcdefABCDEF' for c in commit):
            raise SystemExit(f'Invalid Biosiglib commit in conformance.json: {commit}')
        print(commit)
        PY
        )"
        echo "commit=${commit}" >> "$GITHUB_OUTPUT"
        echo "Pinned Biosiglib commit: ${commit}"

    - name: Checkout Biosiglib
      uses: actions/checkout@v4
      with:
        repository: BSICoS/biosiglib
        ref: ${{ steps.biosiglib-pin.outputs.commit }}
        path: biosiglib
        persist-credentials: false

    - name: Verify Biosiglib checkout
      shell: bash
      run: |
        actual_commit="$(git -C biosiglib rev-parse HEAD)"
        expected_commit="${{ steps.biosiglib-pin.outputs.commit }}"
        echo "Biosiglib checkout: ${GITHUB_WORKSPACE}/biosiglib"
        echo "Biosiglib commit: ${actual_commit}"
        if [ "${actual_commit}" != "${expected_commit}" ]; then
          echo "Biosiglib commit mismatch: expected ${expected_commit}, actual ${actual_commit}" >&2
          exit 1
        fi
    
    - name: Setup MATLAB
      uses: matlab-actions/setup-matlab@v2
      with:
        release: R2025a
        cache: true
        products: |
          MATLAB
          Signal_Processing_Toolbox
          Curve_Fitting_Toolbox
    
    - name: Verify MATLAB installation
      uses: matlab-actions/run-command@v2
      with:
        command: |
          fprintf('=== MATLAB License Verification ===\n');
          fprintf('MATLAB Version: %s\n', version);
          fprintf('License: %s\n', license);
          fprintf('Platform: %s\n', computer);
          fprintf('Available toolboxes:\n');
          installedToolboxes = ver;
          for i = 1:length(installedToolboxes)
              fprintf('  - %s %s\n', installedToolboxes(i).Name, installedToolboxes(i).Version);
          end
          fprintf('=== End Diagnostic ===\n');
    
    - name: Validate headers
      uses: matlab-actions/run-command@v2
      with:
        command: |
          try
            run('scripts/ci/validateHeadersCI.m');
            fprintf('All headers comply with biosigmat guidelines!\n');
          catch ME
            fprintf('::warning title=Header Validation::Header validation found issues: %s\n', ME.message);
            fprintf('Header validation completed with warnings. Continuing with tests...\n');
          end
    
    - name: Run tests
      uses: matlab-actions/run-command@v2
      env:
        BIOSIGLIB_ROOT: ${{ github.workspace }}/biosiglib
      with:
        command: |
          try
            fprintf('Using BIOSIGLIB_ROOT=%s\n', getenv('BIOSIGLIB_ROOT'));
            run('scripts/ci/runTestsCI.m');
            fprintf('All tests passed successfully!\n');
          catch ME
            fprintf('Test execution failed: %s\n', ME.message);
            exit(1);
          end
    
    - name: Publish test results
      uses: dorny/test-reporter@v1
      if: always()
      with:
        name: MATLAB Test Results
        path: test-results.xml
        reporter: java-junit
        fail-on-error: true
    
    - name: Upload test artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: |
          test-results.xml
          coverage.xml
        retention-days: 30
